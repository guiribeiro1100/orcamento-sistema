<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão</title>
    <style>
        body { font-family: sans-serif; background: #eef2f7; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 8px solid #2563eb; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 10px; }
        b { color: #64748b; font-size: 0.8em; text-transform: uppercase; display: block; }
        span { color: #1e293b; font-weight: bold; }
        .btn-pdf { background: #2563eb; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <h2 style="text-align:center">📋 Orçamentos Recebidos</h2>
    <div id="lista">Carregando...</div>

<script>
    async function carregar() {
        const lista = document.getElementById('lista');
        try {
            const res = await fetch('/orcamentos');
            const dados = await res.json();

            if (!dados || dados.length === 0) {
                lista.innerHTML = "<h3>Nenhum orçamento disponível.</h3>";
                return;
            }

            lista.innerHTML = '';
            [...dados].reverse().forEach(item => {
                lista.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between">
                            <h3 style="margin:0">CNPJ: ${item.cnpj || '---'}</h3>
                            <small>${item.data}</small>
                        </div>
                        
                        <div class="grid">
                            <div><b>Vendedor</b><span>${item.vendedor || '---'}</span></div>
                            <div><b>Contato</b><span>${item.cliente_cargo}</span></div>
                            <div><b>Produto</b><span>${item.tipo_produto.toUpperCase()}</span></div>
                            <div><b>Ângulo Corte</b><span style="color:#2563eb">${item.angulo_corte || '---'}</span></div>
                            <div><b>Tipo de Fio</b><span>${(item.tipo_fio || '---').toUpperCase()}</span></div>
                            <div><b>Quantidade</b><span>${item.quantidade}</span></div>
                            <div><b>Aplicação</b><span>${item.aplicacao_final}</span></div>
                        </div>

                        <a href="/orcamento/${item.id}/pdf" target="_blank" class="btn-pdf">ABRIR PDF</a>
                    </div>
                `;
            });
        } catch (e) {
            lista.innerHTML = "<h3>Erro ao conectar com o servidor.</h3>";
        }
    }
    carregar();
</script>
</body>
</html>
