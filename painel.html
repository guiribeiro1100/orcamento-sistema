<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel</title>

<style>
body {
    font-family: Arial;
    background: #f3f4f6;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
}

h3 {
    margin: 0 0 10px;
}

button {
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

textarea {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>Painel de Orçamentos</h2>

<div id="lista"></div>

<script>
async function carregar() {
    const res = await fetch('/orcamentos');
    const dados = await res.json();

    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    dados.reverse().forEach(item => {

        let detalhes = '';

        // 🔥 DINÂMICO POR TIPO
        if (item.tipo_produto === 'disco') {
            detalhes = `
                Diâmetro externo: ${item.diametro_externo || '-'} <br>
                Diâmetro interno: ${item.diametro_interno || '-'} <br>
                Fio: ${item.tipo_fio || '-'} <br>
            `;
        }

        if (item.tipo_produto === 'lamina') {
            detalhes = `
                Largura: ${item.largura || '-'} <br>
                Comprimento: ${item.comprimento || '-'} <br>
                Espessura: ${item.espessura || '-'} <br>
            `;
        }

        if (item.tipo_produto === 'usinagem') {
            detalhes = `
                Medidas: ${item.medidas_usinagem || '-'} <br>
            `;
        }

        lista.innerHTML += `
            <div class="card">

                <h3>${item.cliente_cargo || 'Sem nome'} - ${item.tipo_produto}</h3>

                <p>
                    <b>Empresa:</b> ${item.empresa_local || '-'} <br>
                    <b>Telefone:</b> ${item.telefone || '-'} <br>
                    <b>Aplicação:</b> ${item.aplicacao || '-'} <br>
                </p>

                <p>${detalhes}</p>

                ${item.foto ? `<img src="${item.foto}" width="120">` : ''}

                <br>

                <textarea id="resposta-${item.id}" placeholder="Responder orçamento"></textarea>

                <button onclick="responder(${item.id})">Responder</button>

                <br><br>

                <a href="/orcamento/${item.id}/pdf" target="_blank">
                    📄 Gerar PDF
                </a>

            </div>
        `;
    });
}

async function responder(id) {
    const texto = document.getElementById('resposta-' + id).value;

    await fetch('/responder/' + id, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resposta: texto })
    });

    alert('Respondido!');
    carregar();
}

carregar();
</script>

</body>
</html>
