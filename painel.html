<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel</title>
<style>
    body { font-family: Arial; background: #eef2f7; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; margin: auto; margin-bottom: 20px; }
    .badge { padding: 5px 10px; border-radius: 4px; color: white; font-size: 12px; float: right; }
    .novo { background: #f59e0b; }
    .respondido { background: #10b981; }
    .tech { background: #f8fafc; padding: 10px; border-left: 4px solid #2563eb; margin-top: 10px; }
</style>
</head>
<body>

<h2 style="text-align:center">📊 Gestão de Orçamentos</h2>
<div id="lista"></div>

<script>
    async function carregar() {
        const res = await fetch('/orcamentos');
        const dados = await res.json();
        const container = document.getElementById('lista');
        container.innerHTML = '';

        dados.reverse().forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <span class="badge ${item.status}">${item.status.toUpperCase()}</span>
                    <h3>CNPJ: ${item.cnpj}</h3>
                    <p><b>Contato:</b> ${item.cliente_cargo} | <b>Vendedor:</b> ${item.vendedor}</p>
                    <div class="tech">
                        <b>Produto:</b> ${item.tipo_produto.toUpperCase()} | <b>Qtd:</b> ${item.quantidade}<br>
                        <b>Ângulo de Corte:</b> ${item.angulo_corte || '-'}<br>
                        <b>Aplicação:</b> ${item.aplicacao_final}
                    </div>
                    <div style="margin-top:10px">
                        <button onclick="mudarStatus(${item.id}, 'respondido')">Marcar Respondido</button>
                        <a href="/orcamento/${item.id}/pdf" target="_blank">📄 Gerar PDF</a>
                    </div>
                </div>
            `;
        });
    }

    async function mudarStatus(id, st) {
        await fetch('/status/'+id, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: st}) 
        });
        carregar();
    }

    carregar();
</script>
</body>
</html>
