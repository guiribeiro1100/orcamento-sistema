<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitação de Orçamento</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #1e40af; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 25px; }
        h3 { color: #3b82f6; font-size: 1.1em; margin-top: 20px; display: flex; align-items: center; gap: 8px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 18px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; transition: border 0.3s; }
        input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .hidden { display: none; }
        button { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #1d4ed8; }
        #mensagem_sucesso { text-align: center; padding: 50px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .highlight-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="mensagem_sucesso" class="hidden">
        <h2 style="color: #059669;">✅ Orçamento Enviado!</h2>
        <p>Sua solicitação foi registrada com sucesso no sistema.</p>
        <button onclick="window.location.reload()">Fazer Novo Pedido</button>
    </div>

    <div id="form_container">
        <h2>Solicitar Orçamento Técnico</h2>
        <form id="orcamentoForm">

            <h3>👤 Identificação do Cliente</h3>
            <label>CNPJ</label>
            <input type="text" name="cnpj" placeholder="00.000.000/0000-00" required>
            
            <div class="grid-2">
                <div>
                    <label>Nome / Cargo</label>
                    <input type="text" name="cliente_cargo" required>
                </div>
                <div>
                    <label>Vendedor Responsável</label>
                    <input type="text" name="vendedor">
                </div>
            </div>

            <div class="grid-2">
                <div>
                    <label>E-mail</label>
                    <input type="email" name="email">
                </div>
                <div>
                    <label>Telefone / WhatsApp</label>
                    <input type="text" name="telefone">
                </div>
            </div>

            <h3>⚙️ Especificações do Produto</h3>
            <label>Tipo de Produto</label>
            <select name="tipo_produto" id="tipo_produto" required>
                <option value="">Selecione...</option>
                <option value="disco">Disco</option>
                <option value="lamina">Lâmina</option>
                <option value="usinagem">Peça de Usinagem</option>
            </select>

            <div class="grid-2">
                <div>
                    <label>Nome da Máquina</label>
                    <input type="text" name="nome_maquina">
                </div>
                <div>
                    <label>Código da Peça Original</label>
                    <input type="text" name="codigo_original">
                </div>
            </div>

            <div id="campos_comuns_tecnicos" class="hidden highlight-box">
                <div class="grid-2">
                    <div>
                        <label>Ângulo de corte</label>
                        <input type="text" name="angulo_corte" placeholder="Ex: 30°">
                    </div>
                    <div>
                        <label>Tipo de Fio</label>
                        <select name="tipo_fio">
                            <option value="unico">Fio Único</option>
                            <option value="duplo">Fio Duplo</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="secao_disco" class="hidden">
                <label>Medidas do Disco</label>
                <div class="grid-2">
                    <input type="text" name="diametro_externo" placeholder="Diâmetro Externo">
                    <input type="text" name="diametro_interno" placeholder="Diâmetro Interno">
                </div>
                <input type="text" name="espessura_disco" placeholder="Espessura">
                
               <label>Perfil de Corte</label>
<select name="perfil_corte_disco" id="perfil_corte_disco">
    <option value="liso">Liso</option>
    <option value="fendas">Fendas</option>
    <option value="dentes_serra">Dentes de Serra</option>
    <option value="ondulado">Ondulado</option> <option value="microserrilhado">Microserrilhado</option> <option value="outro">Outro...</option>
</select>
                <textarea id="perfil_outro_disco" name="perfil_outro_disco" placeholder="Descreva o perfil" class="hidden"></textarea>
            </div>

            <div id="secao_lamina" class="hidden">
                <label>Medidas da Lâmina</label>
                <div class="grid-2">
                    <input type="text" name="largura" placeholder="Largura">
                    <input type="text" name="comprimento" placeholder="Comprimento">
                </div>
                <input type="text" name="espessura_lamina" placeholder="Espessura">
            </div>

            <div id="secao_usinagem" class="hidden">
                <label>Detalhes e Medidas da Usinagem</label>
                <textarea name="medidas_usinagem" rows="4"></textarea>
            </div>

            <h3>🏭 Aplicação</h3>
            <select name="aplicacao" id="aplicacao">
                <option value="aves">Aves</option>
                <option value="bovinos">Bovinos</option>
                <option value="suinos">Suínos</option>
                <option value="pescados">Pescados</option>
                <option value="fabricantes">Fabricantes de máquinas</option>
                <option value="outro">Outro</option>
            </select>
            <textarea id="aplicacao_outro" name="aplicacao_outro" class="hidden" placeholder="Especifique a aplicação..."></textarea>

            <h3>📦 Quantidade e Foto</h3>
            <input type="number" name="quantidade" placeholder="Quantidade desejada">
            <input type="file" name="foto">

            <button type="submit">Enviar Solicitação</button>
        </form>
    </div>
</div>

<script>
    const tipo = document.getElementById('tipo_produto');
    const disco = document.getElementById('secao_disco');
    const lamina = document.getElementById('secao_lamina');
    const usinagem = document.getElementById('secao_usinagem');
    const comuns = document.getElementById('campos_comuns_tecnicos');

    tipo.addEventListener('change', () => {
        // Esconde tudo primeiro
        [disco, lamina, usinagem, comuns].forEach(d => d.classList.add('hidden'));
        
        // Se selecionou algo, mostra os campos de Ângulo/Fio + a seção específica
        if (tipo.value !== "") {
            comuns.classList.remove('hidden');
            if (tipo.value === 'disco') disco.classList.remove('hidden');
            if (tipo.value === 'lamina') lamina.classList.remove('hidden');
            if (tipo.value === 'usinagem') usinagem.classList.remove('hidden');
        }
    });

    function toggleOutro(selectId, targetId) {
        const s = document.getElementById(selectId);
        const t = document.getElementById(targetId);
        s.addEventListener('change', () => {
            if (s.value === 'outro') t.classList.remove('hidden');
            else { t.classList.add('hidden'); t.value = ''; }
        });
    }

    toggleOutro('aplicacao', 'aplicacao_outro');
    toggleOutro('perfil_corte_disco', 'perfil_outro_disco');

    document.getElementById('orcamentoForm').onsubmit = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const res = await fetch('/orcamento', { method: 'POST', body: fd });
        if (res.ok) {
            document.getElementById('form_container').classList.add('hidden');
            document.getElementById('mensagem_sucesso').classList.remove('hidden');
            window.scrollTo(0,0);
        }
    };
</script>
</body>
</html>
