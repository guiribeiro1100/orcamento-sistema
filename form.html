<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Orçamento</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3f4f6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 25px; color: #2563eb; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; color: #374151; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .hidden { display: none; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #mensagem_sucesso { text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div id="mensagem_sucesso" class="hidden">
        <h2>✅ Pedido Enviado!</h2>
        <p>Recebemos sua solicitação de orçamento.</p>
        <button onclick="window.location.reload()">Novo Orçamento</button>
    </div>

    <div id="form_container">
        <h2>Solicitar Orçamento</h2>
        <form id="orcamentoForm" action="/orcamento" method="POST" enctype="multipart/form-data">
            <h3>👤 Dados do Cliente</h3>
            <input type="text" name="empresa_local" placeholder="Nome da Empresa" required>
            <input type="text" name="cnpj" placeholder="CNPJ (00.000.000/0000-00)">
            <input type="text" name="cliente_cargo" placeholder="Nome do Contato / Cargo" required>
            <input type="email" name="email" placeholder="Email">
            <input type="text" name="telefone" placeholder="Telefone">
            <input type="text" name="vendedor" placeholder="Vendedor Responsável">

            <h3>🧱 Material</h3>
            <select name="material_tipo" id="material_tipo">
                <option value="">Selecione o Material</option>
                <option value="m9">M9</option>
                <option value="m3">M3</option>
                <option value="outro">Outro</option>
            </select>
            <textarea id="material_outro" name="material_outro" placeholder="Descreva o material" class="hidden"></textarea>

            <h3>⚙️ Especificação</h3>
            <select name="tipo_produto" id="tipo_produto" required>
                <option value="">Selecione o Tipo de Produto</option>
                <option value="disco">Disco</option>
                <option value="lamina">Lâminas</option>
                <option value="usinagem">Peças de usinagem</option>
            </select>
            <input type="text" name="nome_maquina" placeholder="Nome da máquina">
            <input type="text" name="codigo_original" placeholder="Código da peça original">

            <div id="disco" class="hidden">
                <input type="text" name="diametro_externo" placeholder="Diâmetro externo">
                <input type="text" name="diametro_interno" placeholder="Diâmetro interno">
                <input type="text" name="espessura_disco" placeholder="Espessura">
                <label>Tipo de Fio</label>
                <select name="tipo_fio_disco">
                    <option value="">Selecione</option>
                    <option value="fio_unico">
