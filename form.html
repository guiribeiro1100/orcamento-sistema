<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solicitar Orçamento</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.container {
    max-width:800px;
    margin:auto;
    padding:20px;
}

.section {
    margin-top:20px;
    padding:15px;
    background:#111827;
    border-radius:12px;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:white;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

h3 {
    margin-top:0;
}

img {
    width:100%;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📦 Solicitar Orçamento</h1>

<form id="form" enctype="multipart/form-data">

<!-- ========================= -->
<!-- DADOS CLIENTE (JÁ EXISTIA) -->
<!-- ========================= -->

<div class="section">
<h3>Dados do Cliente</h3>

<input name="cliente_cargo" placeholder="Cliente - Cargo">
<input name="empresa_local" placeholder="Empresa - Cidade - Estado">
<input name="email" placeholder="Email">
<input name="telefone" placeholder="Telefone">
<input name="vendedor" placeholder="Vendedor">
</div>

<!-- ========================= -->
<!-- DISCO DE CORTE -->
<!-- ========================= -->

<div class="section">
<h3>📦 Especificações do Disco</h3>

<img src="https://static.wixstatic.com/media/4edf18_6af2fc2c4430426cafd150271110234c~mv2.png">

<label>Aplicação - Nome da Máquina</label>
<input name="aplicacao" placeholder="Ex: Disco desossador de coxa - Toridas Mark Mayekawa">

<label>Material</label>
<input name="material" placeholder="Ex: Aço inoxidável">

<label>Diâmetro Externo (DE)</label>
<input name="diametro" placeholder="Ex: 100mm">

<label>Espessura (E)</label>
<input name="espessura" placeholder="Ex: 2mm">
</div>

<!-- ========================= -->
<!-- FURAÇÃO -->
<!-- ========================= -->

<div class="section">
<h3>🔩 Furação (2/4)</h3>

<img src="https://static.wixstatic.com/media/4edf18_7a229489cd4e40d689c290abfd8e9b79~mv2.png">

<select name="tipo_furo">
    <option>Furo circular</option>
    <option>Furo oblongo</option>
    <option>Furo sextavado</option>
    <option>Outros</option>
</select>

<label>Diâmetro 1 (D1)</label>
<input name="d1">

<label>Sextavado 1 (S1)</label>
<input name="s1">

<label>Diâmetro 2 (D2)</label>
<input name="d2">

<label>Diâmetro menor (d1)</label>
<input name="dmin">

<label>Sextavado 2 (S2)</label>
<input name="s2">

<label>Comprimento 1 (C1)</label>
<input name="c1">
</div>

<!-- ========================= -->
<!-- TIPO DE FIO -->
<!-- ========================= -->

<div class="section">
<h3>🧵 Tipo de Fio (3/4)</h3>

<select name="tipo_fio">
    <option>Fio Único</option>
    <option>Fio Único com chanfro</option>
    <option>Fio Duplo</option>
</select>

<label>Distância de Ângulo (DA)</label>
<input name="da">

<label>Distância de Fio (DF)</label>
<input name="df">
</div>

<!-- ========================= -->
<!-- PERFIL DE CORTE -->
<!-- ========================= -->

<div class="section">
<h3>✂️ Perfil de Corte (4/4)</h3>

<img src="https://static.wixstatic.com/media/4edf18_40f672d59a6742d8803e54198a408a0e~mv2.png">

<select name="perfil_corte">
    <option>Fio liso</option>
    <option>Fio com fendas</option>
    <option>Fio ondulado</option>
    <option>Fio serrilhado</option>
</select>

<label>Largura (L)</label>
<input name="largura">

<label>Comprimento (C)</label>
<input name="comprimento">
</div>

<!-- ========================= -->
<!-- UPLOAD -->
<!-- ========================= -->

<div class="section">
<h3>📸 Upload de Imagem</h3>

<input type="file" name="foto">
</div>

<button>Enviar Orçamento</button>

</form>

</div>

<script>
document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    await fetch('/orcamento', {
        method:'POST',
        body: formData
    });

    alert('Orçamento enviado com sucesso!');
});
</script>

</body>
</html>
