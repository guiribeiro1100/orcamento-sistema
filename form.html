<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Solicitar Orçamento</title>

<style>
body {
    font-family: Arial;
    background: #f3f4f6;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
}

h3 {
    margin-top: 25px;
    color: #2563eb;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.hidden {
    display: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Solicitar Orçamento</h2>

<form action="/orcamento" method="POST" enctype="multipart/form-data">

<!-- CLIENTE -->
<h3>👤 Dados do Cliente</h3>

<input type="text" name="empresa_local" placeholder="Empresa">
<input type="text" name="cliente_cargo" placeholder="Cliente" required>
<input type="email" name="email" placeholder="Email">
<input type="text" name="telefone" placeholder="Telefone">
<input type="text" name="vendedor" placeholder="Vendedor">

<h3>🧱 Material</h3>

<select name="material_tipo" id="material_tipo">
    <option value="">Selecione</option>
    <option value="m9">M9</option>
    <option value="m3">M3</option>
    <option value="outro">Outro</option>
</select>

<textarea id="material_outro" name="material_outro" placeholder="Descreva o material" class="hidden"></textarea>

<h3>⚙️ Especificação</h3>

<select name="tipo_produto" id="tipo_produto" required>
    <option value="">Selecione</option>
    <option value="disco">Disco</option>
    <option value="lamina">Lâminas</option>
    <option value="usinagem">Peças de usinagem</option>
</select>

<input type="text" name="nome_maquina" placeholder="Nome da máquina">
<input type="text" name="codigo_original" placeholder="Código da peça original">

<!-- DISCO -->
<div id="disco" class="hidden">

<input type="text" name="diametro_externo" placeholder="Diâmetro externo">
<input type="text" name="diametro_interno" placeholder="Diâmetro interno">
<input type="text" name="espessura_disco" placeholder="Espessura">
<select name="tipo_fio">
    <option value="">Tipo de fio</option>
    <option value="fio_unico">Fio único</option>
    <option value="fio_duplo">Fio duplo</option>
</select>

<input type="text" name="tipo_fio_desc" placeholder="Descrição do fio">
<textarea name="obs_disco" placeholder="Observação"></textarea>

</div>

<!-- LAMINA -->
<div id="lamina" class="hidden">

<input type="text" name="largura" placeholder="Largura">
<input type="text" name="comprimento" placeholder="Comprimento">
<input type="text" name="espessura" placeholder="Espessura">
<textarea name="obs_lamina" placeholder="Observação"></textarea>

</div>

<!-- USINAGEM -->
<div id="usinagem" class="hidden">

<textarea name="medidas_usinagem" placeholder="Medidas"></textarea>

</div>

<!-- APLICAÇÃO -->
<h3>🏭 Aplicação</h3>

<select name="aplicacao" id="aplicacao">
    <option value="">Selecione</option>
    <option value="aves">Aves</option>
    <option value="bovinos">Bovinos</option>
    <option value="suinos">Suínos</option>
    <option value="pescados">Pescados</option>
    <option value="fabricantes">Fabricantes de máquinas</option>
    <option value="outro">Outro</option>
</select>

<textarea id="aplicacao_outro" name="aplicacao_outro" placeholder="Descreva a aplicação" class="hidden"></textarea>

<h3>📦 Quantidade</h3>
<input type="text" name="quantidade" placeholder="Quantidade">

<h3>📸 Anexo</h3>
<input type="file" name="foto">

<button type="submit">Enviar Orçamento</button>

</form>

</div>

<script>
// =========================
// PRODUTO
// =========================
const tipo = document.getElementById('tipo_produto');

const disco = document.getElementById('disco');
const lamina = document.getElementById('lamina');
const usinagem = document.getElementById('usinagem');

tipo.addEventListener('change', () => {
    disco.classList.add('hidden');
    lamina.classList.add('hidden');
    usinagem.classList.add('hidden');

    if (tipo.value === 'disco') disco.classList.remove('hidden');
    if (tipo.value === 'lamina') lamina.classList.remove('hidden');
    if (tipo.value === 'usinagem') usinagem.classList.remove('hidden');
});

// =========================
// MATERIAL OUTRO
// =========================
const material = document.getElementById('material_tipo');
const materialOutro = document.getElementById('material_outro');

material.addEventListener('change', () => {
    if (material.value === 'outro') {
        materialOutro.classList.remove('hidden');
    } else {
        materialOutro.classList.add('hidden');
        materialOutro.value = '';
    }
});

// =========================
// APLICAÇÃO OUTRO
// =========================
const aplicacao = document.getElementById('aplicacao');
const aplicacaoOutro = document.getElementById('aplicacao_outro');

aplicacao.addEventListener('change', () => {
    if (aplicacao.value === 'outro') {
        aplicacaoOutro.classList.remove('hidden');
    } else {
        aplicacaoOutro.classList.add('hidden');
        aplicacaoOutro.value = '';
    }
});
</script>

</body>
</html>
